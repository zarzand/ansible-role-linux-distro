- name: firewall | Using ufw
  when:
    - (ansible_facts.services['ufw.service'] is defined)
    - ansible_facts.services['ufw.service'].status == 'enabled'
    - ansible_facts.services['ufw.service'].state == 'running'
  block:

  - name: firewall | Set ufw interface if not defined
    ansible.builtin.set_fact:
      firewall_interfaces: "{{ item.new_name }}"
    with_items: "{{ ethernet_interface_list }}"
    when:
      - firewall_interface is not defined
      - item.link == 'yes'
      - item.state == 'up'

#  - name: firewall | Gather current ufw rules
#    ansible.builtin.command: ufw status numbered
#    register: current_firewall_list
#    changed_when: false
#
#  - name: Remove UFW rules not in allowed list
#    ansible.builtin.shell: >
#      ufw delete {{ item.rule_number }}
#    loop: "{{ current_firewall_list.stdout_lines | select('match', '^\\s*\\d+') | map('regex_search', '^(\\d+)') | map('first') | list }}"
#    when: item.rule_number not in current_firewall_list | map(attribute='name') | list
#    vars:
#      # Map UFW numbered rules to a dict
#      item: { rule_number: "{{ item }}" }

  - name: firewall | Add ufw ports
    community.general.ufw:
      rule: allow
      interface: >-
          {{
            firewall_interfaces
            if set_default_interface | default(false) | bool
            else omit
          }}
      name: "{{ item.description | default(omit) }}"
      port: "{{ item.port | default(omit) }}"
      proto: "{{ item.protocol | default(omit) }}"
    with_items: "{{ firewall_ports }}"
    notify: Reload UFW

