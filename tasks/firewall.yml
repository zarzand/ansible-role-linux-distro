---

- name: firewall | Using firewalld
  when:
    - (ansible_facts.services['firewalld.service'] is defined)
    - ansible_facts.services['firewalld.service'].status == 'enabled'
    - ansible_facts.services['firewalld.service'].state == 'running'
  block:
  - name: firewall | Create Firewalld zone if does not exist
    ansible.posix.firewalld:
      zone: "{{ firewall_zone }}"
      state: present
      permanent: true

  - name: firewall | Set firewalld default zone
    ansible.builtin.shell:
      cmd: |
        firewall-cmd --set-default-zone="{{ firewall_zone }}"
    when:
      - firewall_set_default_zone | default(false) | bool

  - name: firewall | Set firewalld interface if not defined
    ansible.builtin.set_fact:
      firewall_interfaces: "{{ item.new_name }}"
    with_items: "{{ ethernet_interface_list }}"
    when:
      - firewall_interface is not defined
      - item.link == 'yes'
      - item.state == 'up'

  - name: firewall | Set firewalld interface to zone
    ansible.posix.firewalld:
      zone: "{{ firewall_zone }}"
      interface: "{{ item  }}"
      state: enabled
      permanent: true
      immediate: true
    with_items: "{{ firewall_interfaces }}"
    when:
      - firewall_set_default_interface | default(false) | bool

  - name: firewall | Get current firewalld services list
    ansible.builtin.shell:
      cmd: |
        firewall-cmd --zone="{{ firewall_zone }}" --list-services
    register: current_firewall_services_list
    changed_when: false
    failed_when: false

#  - name: firewall | Remove all services not in the 'firewall_services' list
#    ansible.posix.firewalld:
#      zone: "{{ firewall_zone }}"
#      service: "{{ item }}"
#      state: absent
#      permanent: true
#      immediate: true
#    loop: "{{ current_firewall_services_list.stdout.split() | difference(firewall_services | map(attribute='service') | list) }}"
#    when:
#      - current_firewall_services_list.rc == 0
#      - (current_firewall_services_list.stdout.split() | default([])) | length > 0

  - name: firewall | Add firewalld services to zone
    ansible.posix.firewalld:
      zone: "{{ firewall_zone }}"
      service: "{{ item }}"
      state: enabled
      permanent: true
      immediate: true
    with_items: "{{ firewall_services }}"
    notify: Reload Firewalld

  - name: firewall | Get current firewalld ports list
    ansible.builtin.shell:
      cmd: |
        firewall-cmd --zone="{{ firewall_zone }}" --list-ports
    register: current_firewall_ports_list
    changed_when: false
    failed_when: false

#  - name: firewall | Remove all ports not in the 'firewall_ports' list
#    ansible.posix.firewalld:
#      zone: "{{ firewall_zone }}"
#      port: "{{ item }}"
#      state: absent
#      permanent: true
#      immediate: true
#    loop: "{{ current_firewall_ports_list.stdout.split() | difference(firewall_ports | map(attribute='port') | zip(firewall_ports | map(attribute='protocol')) | map('join', '/') | list) }}"
#    when:
#      - current_firewall_ports_list.rc == 0
#      - (current_firewall_ports_list.stdout.split() | default([])) | length > 0

  - name: firewall | Add firewalld ports to zone
    ansible.posix.firewalld:
      zone: "{{ firewall_zone }}"
      port: "{{ item.port }}/{{ item.protocol }}"
      state: enabled
      permanent: true
      immediate: true
    with_items: "{{ firewall_ports }}"
    notify: Reload Firewalld

